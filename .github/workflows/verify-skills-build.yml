name: verify-skills-build

on:
  pull_request:
    paths:
      - ".agents/skills/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-skills.sh"
      - "scripts/check-skills-build.sh"
  push:
    paths:
      - ".agents/skills/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-skills.sh"
      - "scripts/check-skills-build.sh"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: npm ci

      - name: Verify generated skill artifacts
        run: ./scripts/check-skills-build.sh
